<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cloud Engineer portfolio and operations platform — deployed on AWS." />
    <title>Cloud Engineer Portfolio</title>
    <!-- Apply the saved theme before React mounts to avoid a flash of light mode. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
